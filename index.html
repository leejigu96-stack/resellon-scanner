  if(!code){r.innerHTML='';return;}
  const it=DB[code];
  if(!it){r.innerHTML='<div class="none">❌ 등록되지 않은 코드<br><small>'+code+'</small></div>';return;}
  r.innerHTML='<div class="card"><img src="'+(it.img||'')+'"><div class="body">'
    +'<div class="nm">'+it.name+'</div><div class="pr">'+won(it.price)+'</div>'
    +'<div class="meta">코드 '+code+(it.pno?' · 11번가 '+it.pno:'')+'</div></div></div>';
}
let scanner=null;
function startScan(){
  scanner=new Html5Qrcode("reader");
  const cfg={fps:10,qrbox:{width:260,height:160},
    formatsToSupport:[Html5QrcodeSupportedFormats.CODE_128,Html5QrcodeSupportedFormats.QR_CODE,Html5QrcodeSupportedFormats.CODE_39,Html5QrcodeSupportedFormats.EAN_13]};
  scanner.start({facingMode:"environment"}, cfg,
    (txt)=>{lookup(String(txt).trim().toUpperCase());},
    ()=>{}).catch(e=>{document.getElementById('result').innerHTML='<div class="hint">카메라 권한을 허용해주세요. (수동입력은 가능)</div>';});
}
</script></body></html>
